name: Deploy to Portainer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (leave empty for latest release)'
        required: false
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release
        id: get_release
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "Fetching latest release..."
            RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest")
            VERSION=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
            RELEASE_BODY=$(echo "$RELEASE_DATA" | jq -r '.body')
          else
            echo "Using specified version: ${{ inputs.version }}"
            VERSION="${{ inputs.version }}"
            RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION")
            RELEASE_BODY=$(echo "$RELEASE_DATA" | jq -r '.body')
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Deploying version: $VERSION"

      - name: Extract Docker image tag
        id: extract_image
        run: |
          VERSION="${{ steps.get_release.outputs.version }}"
          # Remove 'v' prefix if present
          VERSION_NUMBER="${VERSION#v}"
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/firevision-iptv-server:${VERSION_NUMBER}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Docker image: $IMAGE_TAG"

      - name: Prepare production docker-compose
        run: |
          # Create production docker-compose file with environment variables
          cat > docker-compose.production.yml << 'EOF'
          version: '3.8'

          services:
            api:
              image: ${{ steps.extract_image.outputs.image_tag }}
              container_name: firevision-api
              restart: unless-stopped
              environment:
                NODE_ENV: production
                PORT: 3000
                MONGODB_URI: ${{ secrets.MONGODB_URI }}
                REDIS_URL: ${{ secrets.REDIS_URL }}
                JWT_SECRET: ${{ secrets.JWT_SECRET }}
                JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
                API_KEY: ${{ secrets.API_KEY }}
                OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
                OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
                OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
                OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
                SMTP_HOST: ${{ secrets.SMTP_HOST }}
                SMTP_PORT: ${{ secrets.SMTP_PORT }}
                SMTP_USER: ${{ secrets.SMTP_USER }}
                SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
              networks:
                - firevision-network
              depends_on:
                - mongodb
                - redis
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s

            mongodb:
              image: mongo:7
              container_name: firevision-mongodb
              restart: unless-stopped
              volumes:
                - mongodb_data:/data/db
              networks:
                - firevision-network
              healthcheck:
                test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
                interval: 30s
                timeout: 10s
                retries: 3

            redis:
              image: redis:7-alpine
              container_name: firevision-redis
              restart: unless-stopped
              volumes:
                - redis_data:/data
              networks:
                - firevision-network
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 30s
                timeout: 10s
                retries: 3

            nginx:
              image: nginx:alpine
              container_name: firevision-nginx
              restart: unless-stopped
              ports:
                - "80:80"
                - "443:443"
              volumes:
                - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
                - ./nginx/ssl:/etc/nginx/ssl:ro
                - ./apks:/usr/share/nginx/html/apks:ro
              networks:
                - firevision-network
              depends_on:
                - api

          networks:
            firevision-network:
              driver: bridge

          volumes:
            mongodb_data:
            redis_data:
          EOF

          echo "Production docker-compose file created"
          cat docker-compose.production.yml

      - name: Deploy to Portainer
        id: deploy
        run: |
          echo "Authenticating with Portainer..."

          # Get stack file content
          STACK_FILE=$(cat docker-compose.production.yml | jq -Rs .)

          # Prepare stack update payload
          PAYLOAD=$(jq -n \
            --arg stackFile "$STACK_FILE" \
            --argjson endpointId "${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            '{
              stackFileContent: $stackFile,
              env: [],
              prune: false,
              pullImage: true
            }')

          echo "Updating Portainer stack: firevision-iptv-${{ inputs.environment }}"

          # Update stack via Portainer API
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Stack updated successfully"
            echo "deployment_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Stack update failed"
            echo "deployment_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Wait for deployment
        run: |
          echo "Waiting for containers to start..."
          sleep 30

      - name: Health check
        id: health_check
        run: |
          echo "Running health check..."
          MAX_RETRIES=10
          RETRY_COUNT=0
          HEALTH_URL="${{ vars.HEALTH_CHECK_URL || 'https://tv.cadnative.com/health' }}"

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES"
            
            RESPONSE=$(curl -s -w "\n%{http_code}" "$HEALTH_URL" || echo "000")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
            
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✅ Health check passed"
              echo "$RESPONSE_BODY" | jq .
              
              # Verify MongoDB and Redis connections
              MONGODB_STATUS=$(echo "$RESPONSE_BODY" | jq -r '.mongodb // "unknown"')
              REDIS_STATUS=$(echo "$RESPONSE_BODY" | jq -r '.redis // "unknown"')
              
              if [ "$MONGODB_STATUS" = "connected" ] && [ "$REDIS_STATUS" = "connected" ]; then
                echo "✅ All services connected"
                echo "health_status=healthy" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "⚠️ Some services not connected: MongoDB=$MONGODB_STATUS, Redis=$REDIS_STATUS"
              fi
            else
              echo "⚠️ Health check failed with status: $HTTP_CODE"
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
            fi
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts"
          echo "health_status=unhealthy" >> $GITHUB_OUTPUT
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.get_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Image**: ${{ steps.extract_image.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Status**: ${{ steps.deploy.outputs.deployment_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Status**: ${{ steps.health_check.outputs.health_status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.health_check.outputs.health_status }}" = "healthy" ]; then
            echo "✅ **Deployment successful!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The application is now live at: https://tv.cadnative.com" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed or unhealthy**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please check the logs and consider rolling back." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.get_release.outputs.version }}';
            const imageTag = '${{ steps.extract_image.outputs.image_tag }}';
            const environment = '${{ inputs.environment }}';

            // Get the release
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: version
            });

            // Add comment to release
            await github.rest.repos.createReleaseComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: `✅ Successfully deployed to **${environment}**\n\n` +
                    `- Docker Image: \`${imageTag}\`\n` +
                    `- Deployed at: ${new Date().toISOString()}\n` +
                    `- Health Check: Passed\n` +
                    `- URL: https://tv.cadnative.com`
            });
