services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: firevision-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: firevision-iptv
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    # Expose MongoDB to host for local scripts (bind to localhost only for security)
    ports:
      - '127.0.0.1:27017:27017'
    networks:
      - firevision-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/firevision-iptv --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: firevision-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    networks:
      - firevision-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  # MongoDB Admin UI (mongo-express)
  mongo-express:
    image: mongo-express:1.0
    container_name: firevision-mongo-express
    restart: unless-stopped
    ports:
      - '127.0.0.1:8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/firevision-iptv
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - firevision-network

  # MailHog (email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: firevision-mailhog
    restart: unless-stopped
    ports:
      - '127.0.0.1:1025:1025' # SMTP
      - '127.0.0.1:8025:8025' # Web UI
    networks:
      - firevision-network

  # Node.js API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: firevision-api
    restart: unless-stopped
    ports:
      - '8009:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/firevision-iptv
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: '*'
      UPLOAD_DIR: /app/uploads
      # Super Admin Initial Credentials
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-ChangeMeNow123!}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@firevision.local}
      SUPER_ADMIN_CHANNEL_LIST_CODE: ${SUPER_ADMIN_CHANNEL_LIST_CODE:-5T6FEP}
      FORCE_UPDATE_ADMIN_PASSWORD: ${FORCE_UPDATE_ADMIN_PASSWORD:-false}
      # Session Configuration
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret-key-to-random-string}
      # Scheduler is handled by the dedicated scheduler container
      DISABLE_SCHEDULER: 'true'
      # Email
      MAIL_PROVIDER: mailhog
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: 1025
      MAIL_FROM: noreply@firevision.local
      APP_URL: http://localhost:3001
    volumes:
      - ./backend/src:/app/backend/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - firevision-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    container_name: firevision-frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
      WATCHPACK_POLLING: 'true'
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
    depends_on:
      api:
        condition: service_healthy
    networks:
      - firevision-network

  # Background Scheduler (runs liveness checks, EPG refresh, cache refresh)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: firevision-scheduler
    restart: unless-stopped
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/firevision-iptv
      REDIS_URL: redis://redis:6379
      LIVENESS_CHECK_INTERVAL_MS: ${LIVENESS_CHECK_INTERVAL_MS:-86400000}
      EPG_REFRESH_INTERVAL_MS: ${EPG_REFRESH_INTERVAL_MS:-21600000}
      CACHE_REFRESH_INTERVAL_MS: ${CACHE_REFRESH_INTERVAL_MS:-3600000}
    command: ['npx', 'tsx', 'watch', 'backend/src/scheduler-entrypoint.ts']
    volumes:
      - ./backend/src:/app/backend/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - firevision-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  firevision-network:
    driver: bridge
